name: auto-release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to') && !contains(github.event.head_commit.message, 'automation/version-bump')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_BUMP_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read and bump version
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re
          import subprocess

          loader = pathlib.Path("extracted/sketchup_ext/bc_pdf_vector_importer.rb")
          metadata = pathlib.Path("extracted/sketchup_ext/bc_pdf_vector_importer/metadata.rb")
          readme = pathlib.Path("README.md")

          loader_text = loader.read_text(encoding="utf-8")
          match = re.search(r"PLUGIN_VERSION\s*=\s*'(\d+)\.(\d+)\.(\d+)'", loader_text)
          if not match:
              raise SystemExit("Could not find PLUGIN_VERSION in extracted/sketchup_ext/bc_pdf_vector_importer.rb")

          major, minor, patch = map(int, match.groups())
          old_version = f"{major}.{minor}.{patch}"

          tags = set(
              t.strip()
              for t in subprocess.check_output(
                  ["git", "tag", "--list"],
                  text=True,
              ).splitlines()
              if t.strip()
          )
          next_patch = patch + 1
          while f"v{major}.{minor}.{next_patch}" in tags:
              next_patch += 1
          new_version = f"{major}.{minor}.{next_patch}"

          loader_text = re.sub(
              r"(PLUGIN_VERSION\s*=\s*')(\d+\.\d+\.\d+)(')",
              rf"\g<1>{new_version}\3",
              loader_text,
              count=1,
          )
          loader.write_text(loader_text, encoding="utf-8")

          metadata_text = metadata.read_text(encoding="utf-8")
          metadata_text = re.sub(
              r"(VERSION\s*=\s*')(\d+\.\d+\.\d+)(')",
              rf"\g<1>{new_version}\3",
              metadata_text,
              count=1,
          )
          metadata.write_text(metadata_text, encoding="utf-8")

          readme_text = readme.read_text(encoding="utf-8")
          readme_text = re.sub(
              r"(Version-)(\d+\.\d+\.\d+)(-(green|blue)\.svg)",
              rf"\g<1>{new_version}\3",
              readme_text,
              count=1,
          )
          readme.write_text(readme_text, encoding="utf-8")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.write_text(
              f"old_version={old_version}\nversion={new_version}\n",
              encoding="utf-8",
          )
          PY

      - name: Commit and push version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add extracted/sketchup_ext/bc_pdf_vector_importer.rb extracted/sketchup_ext/bc_pdf_vector_importer/metadata.rb README.md
          if git diff --cached --quiet; then
            echo "No version bump changes to commit."
          else
            git commit -m "chore: bump version to ${VERSION}"
            if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "::warning::Could not push version bump to '${GITHUB_REF_NAME}' (likely branch protection). Continuing to publish the release; tag-based versioning keeps releases unique."
            fi
          fi

      - name: Build .rbz
        run: python build_release.py

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="v${{ steps.version.outputs.version }}"
          RBZ="bc_pdf_vector_importer_v${{ steps.version.outputs.version }}.rbz"

          git fetch --tags --force
          if ! git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$RBZ" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG — PDF Vector Importer for SketchUp" \
              --notes "Automated release from latest \`main\` commit.

            **Install:** Download \`${RBZ}\` below, then in SketchUp: **Window > Extension Manager > Install Extension**." \
              --latest \
              "$RBZ"
          fi

      - name: Check website dispatch token secret
        id: website_dispatch_token
        env:
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
        run: |
          if [ -n "$WEBSITE_DISPATCH_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch website release update
        if: steps.website_dispatch_token.outputs.has_token == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
          script: |
            const tag = 'v${{ steps.version.outputs.version }}';
            const payload = {
              source_repo: context.repo.owner + '/' + context.repo.repo,
              source_event: 'auto-release',
              source_ref: context.ref,
              source_sha: context.sha,
              release_tag: tag,
              release_name: tag,
              release_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
            };

            await github.request('POST /repos/{owner}/{repo}/dispatches', {
              owner: 'BlueCollar-Systems',
              repo: 'BlueCollar-Website',
              event_type: 'product-release',
              client_payload: payload,
            });

            core.info('Dispatched product-release to BlueCollar-Website');

      - name: Warn when website dispatch token is missing
        if: steps.website_dispatch_token.outputs.has_token != 'true'
        run: |
          echo "::warning::Skipping website dispatch because no valid dispatch token secret is configured."
          echo "Set WEBSITE_DISPATCH_TOKEN (or BLUECOLLAR_WEBSITE_DISPATCH_TOKEN / REPO_DISPATCH_TOKEN) to enable cross-repo dispatch."
