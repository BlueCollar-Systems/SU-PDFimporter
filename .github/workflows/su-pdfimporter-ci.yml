name: su-pdfimporter-ci

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby: ['2.2', '2.7', '3.2']
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Syntax check all .rb files
        run: |
          find extracted/sketchup_ext -name '*.rb' | while read f; do
            ruby -c "$f" || exit 1
          done

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Version consistency check
        run: |
          META_VER=$(grep -oP "VERSION = '\\K[^']+" extracted/sketchup_ext/bc_pdf_vector_importer/metadata.rb | head -n1)
          LOADER_VER=$(grep -oP "PLUGIN_VERSION\\s*=\\s*'\\K[^']+" extracted/sketchup_ext/bc_pdf_vector_importer.rb | head -n1)
          README_VER=$(grep -oP 'Version-\K[0-9.]+' README.md | head -n1)
          if [ -z "$META_VER" ] || [ -z "$LOADER_VER" ] || [ -z "$README_VER" ]; then
            echo "ERROR: Could not read version(s): metadata=$META_VER loader=$LOADER_VER readme=$README_VER"
            exit 1
          fi
          if [ "$META_VER" != "$README_VER" ] || [ "$LOADER_VER" != "$README_VER" ]; then
            echo "ERROR: Version mismatch metadata=$META_VER loader=$LOADER_VER readme=$README_VER"
            exit 1
          fi

  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["2.2", "2.7", "3.0", "3.2"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby ${{ matrix.ruby-version }}
        if: matrix.ruby-version != '2.2'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: false

      - name: Ruby 2.2 syntax + smoke (SketchUp Make 2017 compatibility)
        if: matrix.ruby-version == '2.2'
        run: |
          set -e
          docker run --rm -v "${PWD}:/work" -w /work ruby:2.2 bash -lc '
            set -e
            find extracted test -type f -name "*.rb" -print0 | xargs -0 -n1 ruby -c
            ruby test/smoke_test.rb
            ruby test/arc_fitter_test.rb
            ruby test/unit_parser_test.rb
          '

      - name: Ruby syntax check
        if: matrix.ruby-version != '2.2'
        run: |
          set -e
          find extracted test -type f -name "*.rb" -print0 | xargs -0 -n1 ruby -c

      - name: Run smoke test
        if: matrix.ruby-version != '2.2'
        run: |
          ruby test/smoke_test.rb
          ruby test/arc_fitter_test.rb
          ruby test/unit_parser_test.rb
