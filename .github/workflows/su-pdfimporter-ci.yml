name: su-pdfimporter-ci

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Run smoke test
        run: ruby test/smoke_test.rb
